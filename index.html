radient(180deg,rgba(90,10,0,.95),rgba(28,0,0,.96));box-shadow:0 0 0 1px rgba(255,255,255,.05) inset,0 6px 18px rgba(255,60,0,.22),0 0 18px rgba(255,120,0,.18)}.btn.primary{background:linear-gradient(180deg,rgba(170,20,0,.98),rgba(60,0,0,.98));border-color:rgba(255,180,0,.7)}.btn:hover,.btn:active{transform:translateY(-2px) scale(1.02);border-color:rgba(255,180,0,.75);box-shadow:0 10px 22px rgba(255,50,0,.28),0 0 24px rgba(255,160,0,.28)}.label{color:#67e8f9;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.char-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0}.char-card{min-height:160px;border-radius:22px;border:1px solid rgba(255,255,255,.14);background:rgba(2,6,23,.48);color:white;padding:14px;font-size:56px}.lobby-list{margin:18px auto 8px;max-width:440px;display:grid;gap:8px;text-align:left}.lobby-player{display:flex;justify-content:space-between;padding:10px 12px;border-radius:14px;background:rgba(15,23,42,.72);border:1px solid rgba(255,255,255,.12);font-weight:800}.lobby-player.ready{border-color:rgba(34,197,94,.45);color:#bbf7d0}.ready-pill{font-size:11px;padding:4px 8px;border-radius:999px;background:rgba(248,113,113,.16);color:#fecaca}.ready .ready-pill{background:rgba(34,197,94,.18);color:#86efac}#lobbyCountdown{min-height:80px;font-size:clamp(44px,11vw,86px);font-weight:900;color:#fef08a;text-shadow:0 0 22px rgba(250,204,21,.75)}#game{position:fixed;inset:0;z-index:1;background:#020617}canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}#hud{position:fixed;left:12px;top:10px;z-index:10;width:330px;max-width:calc(100vw - 24px);padding:12px;border-radius:18px;background:rgba(2,6,23,.72);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);pointer-events:none}.hud-row{display:flex;justify-content:space-between;gap:8px;font-weight:900;font-size:13px}.bar{height:9px;margin:7px 0;border-radius:999px;overflow:hidden;background:rgba(0,0,0,.42)}.fill{height:100%;width:100%;b <script>
(()=>{
'use strict';
const W=920,H=590,MAX_ENEMIES=12;
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const dpr=Math.min(devicePixelRatio||1,2);function size(){canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}size();addEventListener('resize',size);
function sx(){return innerWidth/W}function sy(){return innerHeight/H}function toGame(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*W,y:(e.clientY-r.top)/r.height*H}}
const $=id=>document.getElementById(id);const els={menu:$('menuScreen'),chars:$('characterScreen'),multi:$('multiplayerScreen'),hud:$('hud'),top:$('topButtons'),weapons:$('weaponRow'),hp:$('hpFill'),xp:$('xpFill'),stage:$('stageFill'),lvl:$('hudLevel'),gold:$('hudGold'),msg:$('message'),weapon:$('hudWeapon'),multiStatus:$('multiStatus'),lobbyPlayers:$('lobbyPlayers'),lobbyInfo:$('lobbyInfo'),lobbyCountdown:$('lobbyCountdown')};
function show(panel){[els.menu,els.chars,els.multi].forEach(x=>x.classList.add('hidden'));if(panel)panel.classList.remove('hidden')}function ui(on){[els.hud,els.top,els.weapons].forEach(x=>x.classList.toggle('hidden',!on))}function safe(v){return String(v||'').replace(/[&<>"']/g,'').slice(0,16)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function rnd(a,b){return a+Math.random()*(b-a)}
const WEAPONS=[{name:'Pink Dildo',damage:26,range:84,cooldown:420,effect:'pink'},{name:'Poop Bucket',damage:36,range:112,cooldown:700,effect:'poop'},{name:'Shocker',damage:24,range:175,cooldown:540,effect:'shock'},{name:'Freezer',damage:18,range:145,cooldown:620,effect:'freeze'},{name:'Golden Shower',damage:22,range:210,cooldown:500,effect:'pee'}];
const POWERS=[{type:'newspaper',name:"ז'ורנאל אישה"},{type:'bavaria',name:'Bavaria Chocolate'},{type:'nofap',name:'No-Fap Challenge'}];
const TYPES=[{hp:54,damage:8,speed:62,color:'#fb7185',speech:''},{hp:68,damage:10,speed:52,color:'#f472b6',speech:'אמא מונעת!!'},{hp:102,damage:14,speed:54,color:'#111',speech:'ביקשתי יין קידוש!!'}];
const TYPES2=[{hp:96,damage:13,speed:55,color:'#0f766e',speech:'יש לך סולם?',kind:'beard'},{hp:118,damage:16,speed:50,color:'#166534',speech:'חכה חכה באזרחות',kind:'army'}];
const TYPE4={hp:118,damage:17,speed:58,color:'#050505',speech:'תקנה לי שווארמה יא זין',kind:'shawarma'};
const state={name:'Player',char:'current',screen:'menu',playing:false,won:false,stage:1,cycle:1,stageKills:0,target:50,weapon:0,player:null,enemies:[],remotes:{},powerups:[],projectiles:[],particles:[],lastAttack:0,nextPower:0,nextProjectile:0,nofapUntil:0,speedUntil:0,msg:'Ready.',sound:true};
const net={ws:null,ready:false,connecting:false,id:Math.random().toString(36).slice(2,10),joinedAt:Date.now(),lastSend:0,lastWorld:0};const lobby={in:false,ready:false,countdownStart:null,started:false};
function stageTarget(s){const b=(state.cycle-1)*60;if(s===1)return 50+b;if(s===2)return 100+b;if(s===3)return 1;if(s===4)return 120+b;if(s===5)return 1;return 50+b}function difficulty(){return 1+(state.cycle-1)*.55+(Object.keys(state.remotes).length?0.25:0)}function isHost(){if(!net.ready)return true;const arr=[{id:net.id,j:net.joinedAt},...Object.keys(state.remotes).map(id=>({id,j:state.remotes[id].joinedAt||Date.now()}))].sort((a,b)=>a.j-b.j||a.id.localeCompare(b.id));return arr[0]?.id===net.id}
let audio=null;function music(){if(!state.sound)return;if(!audio){audio=new Audio('soundtrack.mp3');audio.loop=true;audio.volume=.42;audio.onerror=()=>audio=null}audio&&audio.play().catch(()=>{})}function stopMusic(){audio&&audio.pause()}
function newPlayer(){return{x:W/2,y:H/2,hp:165,maxHp:165,xp:0,nextXp:100,level:1,gold:0,dir:1,walk:0}}
function reset(keep=false){const old=keep&&state.player?state.player:null;state.player=old?{...old,x:W/2,y:H/2,hp:old.maxHp,walk:0}:newPlayer();state.stage=keep?state.stage:1;state.stageKills=0;state.target=stageTarget(state.stage);state.enemies=[];state.powerups=[];state.projectiles=[];state.particles=[];state.nextPower=performance.now()+5000;state.nextProjectile=performance.now()+1400;state.nofapUntil=0;state.speedUntil=0;state.won=false;state.playing=true;state.msg='Game started.'}
function startGame(ch){state.char=ch;state.name=safe($('playerNameInput').value)||'Player';state.screen='game';reset(false);show(null);ui(true);music()}
function nextStage(){if(state.stage===5){win();return}state.stage++;state.stageKills=0;state.target=stageTarget(state.stage);state.enemies=[];state.powerups=[];state.projectiles=[];state.nextProjectile=performance.now()+1200;state.msg=(state.stage===3||state.stage===5)?'Boss fight started.':'Next level started.'}
function win(){state.won=true;state.playing=false;ui(false);show(null);const v=document.createElement('div');v.className='screen';v.id='victoryScreen';v.innerHTML='<div class="panel"><h1 class="metal-logo"><span class="metal-main">GO LAASOT MISHI!</span></h1><p>WOULD YOU LIKE TO CONTINUE?</p><div class="actions"><button class="btn primary" id="yesAgain">YES</button></div></div>';document.body.appendChild(v);$('yesAgain').onclick=()=>{v.remove();state.cycle++;state.stage=1;reset(true);ui(true)}}
function edge(){const s=Math.floor(Math.random()*4);if(s===0)return{x:30,y:rnd(70,H-70)};if(s===1)return{x:W-30,y:rnd(70,H-70)};if(s===2)return{x:rnd(70,W-70),y:50};return{x:rnd(70,W-70),y:H-45}}
function spawnBoss(){const is5=state.stage===5,hp=Math.floor((is5?1700:850)*difficulty());state.enemies.push({id:Math.random(),x:W/2,y:is5?190:170,hp,maxHp:hp,damage:is5?28:18,speed:is5?280:34,xp:is5?1100:600,boss:true,kind:is5?'taxiboss':'boss',color:is5?'#7c2d12':'#ec4899',speech:is5?'תאמין לי.. כשאתה נשוי זה כמו כוס על מגש':'כל המלשינים מהחסידה',nextDash:performance.now()+900,walk:0})}
function spawnEnemy(){const p=edge();let t;if(state.stage===4)t=TYPE4;else if(state.stage===2&&Math.random()<.42)t=TYPES2[Math.floor(Math.random()*TYPES2.length)];else t=TYPES[Math.floor(Math.random()*TYPES.length)];const sc=difficulty(),hp=Math.floor(t.hp*sc);state.enemies.push({id:Math.random(),x:p.x,y:p.y,hp,maxHp:hp,damage:Math.floor(t.damage*sc*.75),speed:t.speed+(state.cycle-1)*5,xp:Math.floor(t.hp*.9*sc),boss:false,kind:t.kind||'enemy',color:t.color,speech:state.stage===4?(Math.random()<.2?t.speech:''):(Math.random()<.25?t.speech:''),walk:0})}
function fillEnemies(){if(state.stage===3||state.stage===5){if(!state.enemies.some(e=>e.boss))spawnBoss();return}while(state.enemies.length<Math.min(MAX_ENEMIES,state.target-state.stageKills))spawnEnemy()}
function spawnPower(t){if(!isHost()||state.powerups.length>=2||t<state.nextPower)return;const item=POWERS[Math.floor(Math.random()*POWERS.length)];state.powerups.push({id:Math.random(),type:item.type,name:item.name,x:rnd(90,W-90),y:rnd(100,H-90)});state.nextPower=t+rnd(6500,11000)}

function update(dt,t){if(!state.playing)return;const p=state.player;let dx=0,dy=0;if(keys.left)dx--;if(keys.right)dx++;if(keys.up)dy--;if(keys.down)dy++;if(dx||dy){const l=Math.hypot(dx,dy);const sp=245+Math.min(p.level*6,45)+(t<state.speedUntil?120:0);p.x=clamp(p.x+dx/l*sp*dt,35,W-35);p.y=clamp(p.y+dy/l*sp*dt,50,H-35);p.dir=dx<0?-1:dx>0?1:p.dir;p.walk+=dt*12}sendPlayer();if(net.ready&&!isHost()){clientEffects(dt);return}fillEnemies();for(const e of state.enemies){const frozen=t<(e.frozenUntil||0);if(!frozen){if(e.kind==='taxiboss'&&t>(e.nextDash||0)){e.x=rnd(90,W-90);e.y=rnd(120,H-90);e.nextDash=t+rnd(750,1250);burst(e.x,e.y,'#facc15',12)}const d=dist(e,p)||1;if(d>38){e.x+=(p.x-e.x)/d*e.speed*dt;e.y+=(p.y-e.y)/d*e.speed*dt}e.walk+=dt*8}if(dist(e,p)<38)p.hp=clamp(p.hp-e.damage*dt*.5,0,p.maxHp)}spawnPower(t);updatePowerups(t);updateProjectiles(dt,t);updateParticles(dt);sendWorld();if(p.hp<=0){state.msg='ZAIN BATAHAT, YOU ARE DEAD';state.playing=false}hud()}
function clientEffects(dt){updatePowerups(performance.now());updateParticles(dt);hud()}
function updatePowerups(t){state.powerups=state.powerups.filter(c=>{if(dist(c,state.player)<42){if(c.type==='newspaper'){state.speedUntil=t+5000;state.msg="ז'ורנאל אישה speed boost"}if(c.type==='bavaria'){state.player.hp=state.player.maxHp;state.msg='Bavaria Chocolate restored HP'}if(c.type==='nofap'){state.nofapUntil=t+12000;state.msg='No-Fap Challenge: 12 seconds'}return false}return true})}
function updateProjectiles(dt,t){if(state.stage!==5)return;const b=state.enemies.find(e=>e.boss);if(!b)return;if(t>state.nextProjectile){const d=dist(b,state.player)||1;state.projectiles.push({x:b.x,y:b.y+8,vx:(state.player.x-b.x)/d*185,vy:(state.player.y-b.y)/d*185,ttl:4});state.nextProjectile=t+rnd(900,1400)}state.projectiles=state.projectiles.filter(pr=>{pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.ttl-=dt;if(dist(pr,state.player)<30){state.player.hp-=22;return false}return pr.ttl>0})}
function updateParticles(dt){state.particles=state.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=260*dt;p.ttl-=dt;return p.ttl>0})}
function draw(){ctx.clearRect(0,0,innerWidth,innerHeight);ctx.save();ctx.scale(sx(),sy());drawBg();for(const p of state.powerups)drawPower(p);for(const pr of state.projectiles)drawProjectile(pr);for(const e of [...state.enemies].sort((a,b)=>a.y-b.y))drawHuman(e,true);for(const id in state.remotes){const r=state.remotes[id];if(r&&!r.inLobby&&Number.isFinite(r.x))drawRemote(r,id)}if(state.player)drawHuman(state.player,false);drawAttackFx();for(const p of state.particles){ctx.globalAlpha=Math.max(0,p.ttl);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}ctx.restore();requestAnimationFrame(loop)}
function drawBg(){if(state.stage===4){ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,170);ctx.fillStyle='#1f2937';ctx.fillRect(0,170,W,190);ctx.fillStyle='#374151';ctx.fillRect(0,330,W,260);ctx.strokeStyle='rgba(250,204,21,.75)';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,455);ctx.lineTo(W,455);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=2;for(let x=0;x<W;x+=90){ctx.beginPath();ctx.moveTo(x,390);ctx.lineTo(x+45,390);ctx.stroke()}ctx.fillStyle='#111827';ctx.fillRect(28,78,90,170);ctx.fillStyle='#334155';ctx.fillRect(140,105,110,145);ctx.fillStyle='#1e293b';ctx.fillRect(690,92,130,160);ctx.fillRect(835,125,72,125);ctx.fillStyle='rgba(253,230,138,.82)';for(let x=42;x<105;x+=24)for(let y=98;y<220;y+=30)ctx.fillRect(x,y,10,14);for(let x=158;x<236;x+=28)for(let y=126;y<226;y+=28)ctx.fillRect(x,y,12,12);for(let x=710;x<800;x+=28)for(let y=112;y<230;y+=29)ctx.fillRect(x,y,12,14);ctx.fillStyle='#064e3b';[[315,315],[370,300],[612,315],[650,292],[760,320]].forEach(([x,y])=>{ctx.fillRect(x-8,y,16,58);ctx.beginPath();ctx.arc(x,y,34,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x-22,y+8,20,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+22,y+8,20,0,Math.PI*2);ctx.fill()});ctx.fillStyle='#334155';ctx.fillRect(42,42,52,82);ctx.fillRect(104,62,24,62);ctx.fillStyle='rgba(148,163,184,.45)';ctx.beginPath();ctx.arc(90,4,16,0,Math.PI*2);ctx.arc(112,22,22,0,Math.PI*2);ctx.arc(135,36,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4b5563';ctx.fillRect(420,242,18,92);ctx.fillStyle='#14532d';round(344,222,208,52,10,true);ctx.strokeStyle='#fde68a';ctx.lineWidth=4;round(344,222,208,52,10,false,true);ctx.fillStyle='#fde68a';ctx.font='bold 24px Arial';ctx.textAlign='center';ctx.fillText('רחוב החסידה',448,255);ctx.textAlign='left';return}const c=state.stage===2?'#d6b98c':state.stage===3?'#3b0764':state.stage===5?'#3f1d0b':'#245466';ctx.fillStyle=c;ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;for(let x=0;x<W;x+=46){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}for(let y=0;y<H;y+=46){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.fillStyle='rgba(255,255,255,.15)';for(let i=0;i<16;i++){ctx.beginPath();ctx.ellipse(40+(i*73)%830,75+(i*57)%430,30,11,0,0,Math.PI*2);ctx.fill()}}
function round(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill)ctx.fill();if(stroke)ctx.stroke()}
function colorForChar(c){return c==='cap'?'#22c55e':c==='blackhair'?'#a855f7':'#38bdf8'}
function drawHuman(o,enemy){ctx.save();ctx.translate(o.x,o.y+Math.sin(o.walk||0)*2);const sc=o.boss?(o.kind==='taxiboss'?1.65:1.45):enemy?.84:.72;ctx.scale(sc*(o.dir||1),sc);const skin=enemy?'#f5d0a9':'#f7d9a8',body=enemy?(o.frozenUntil&&performance.now()<o.frozenUntil?'#60a5fa':o.color):colorForChar(state.char);ctx.fillStyle='rgba(0,0,0,.28)';ctx.beginPath();ctx.ellipse(0,47,27,7,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle=body;ctx.lineWidth=9;ctx.lineCap='round';const w=Math.sin(o.walk||0);ctx.beginPath();ctx.moveTo(-9,18);ctx.lineTo(-17+w*4,50);ctx.moveTo(9,18);ctx.lineTo(17-w*4,50);ctx.stroke();ctx.fillStyle=body;round(-22,-24,44,50,16,true);ctx.strokeStyle=skin;ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(-20,-8);ctx.lineTo(-34+w*7,10);ctx.moveTo(20,-8);ctx.lineTo(34-w*7,10);ctx.stroke();ctx.fillStyle=skin;ctx.beginPath();ctx.ellipse(0,-46,17,20,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=enemy?'#111827':(state.char==='blackhair'?'#020617':'#7c2d12');ctx.beginPath();ctx.ellipse(0,-59,19,10,0,Math.PI,Math.PI*2);ctx.fill();if(!enemy&&state.char==='cap'){ctx.fillStyle='#1e293b';round(-22,-68,44,12,6,true);round(3,-62,28,6,3,true)}if(enemy){ctx.fillStyle='#111827';ctx.beginPath();ctx.arc(-6,-49,2.2,0,Math.PI*2);ctx.arc(7,-49,2.2,0,Math.PI*2);ctx.fill()}if(o.kind==='taxiboss'){ctx.fillStyle='#facc15';round(-42,18,84,34,10,true);ctx.fillStyle='#111827';ctx.fillRect(-22,22,44,14);ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-27,52,9,0,Math.PI*2);ctx.arc(27,52,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.fillRect(-10,11,20,7)}if(o.kind==='taxiboss'||o.kind==='trayboss'){ctx.strokeStyle='#facc15';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,-10,22,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#cbd5e1';ctx.beginPath();ctx.ellipse(38,3,30,11,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f9a8d4';ctx.beginPath();ctx.ellipse(38,1,15,6,0,0,Math.PI*2);ctx.fill()}ctx.restore();if(enemy){drawHp(o);if(o.speech)bubble(o.x,o.y-(o.boss?120:78),o.speech,o.boss?'#fde047':'#fff')}}
function drawRemote(r,id){const fake={x:r.x,y:r.y,walk:performance.now()/130,dir:r.dir||1,boss:false,color:colorForChar(r.character)};drawHuman(fake,false);ctx.fillStyle='#fff';ctx.strokeStyle='#020617';ctx.lineWidth=4;ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.strokeText(safe(r.name)||'Player',r.x,r.y-55);ctx.fillText(safe(r.name)||'Player',r.x,r.y-55);ctx.textAlign='left'}
function drawHp(e){const w=e.boss?150:64,x=e.x-w/2,y=e.y-(e.boss?95:60);ctx.fillStyle='rgba(0,0,0,.55)';round(x,y,w,7,4,true);ctx.fillStyle='#ef4444';round(x,y,w*clamp(e.hp/e.maxHp,0,1),7,4,true)}
function bubble(x,y,text,color){ctx.font='bold 14px Arial';const w=Math.min(260,ctx.measureText(text).width+24);ctx.fillStyle=color;round(x-w/2,y-26,w,32,12,true);ctx.fillStyle='#111827';ctx.textAlign='center';ctx.fillText(text,x,y-5);ctx.textAlign='left'}
function drawPower(p){ctx.save();ctx.translate(p.x,p.y);ctx.fillStyle=p.type==='bavaria'?'#7c2d12':p.type==='nofap'?'#fff':'#fde68a';round(-30,-24,60,48,12,true);ctx.strokeStyle='#fff';ctx.lineWidth=3;round(-30,-24,60,48,12,false,true);if(p.type==='newspaper'){ctx.fillStyle='#fff';ctx.fillRect(-20,-14,40,28);ctx.strokeStyle='#111';for(let y=-8;y<12;y+=6){ctx.beginPath();ctx.moveTo(-15,y);ctx.lineTo(15,y);ctx.stroke()}}if(p.type==='bavaria'){ctx.fillStyle='#3f1d0b';for(let x=-18;x<=10;x+=14)for(let y=-10;y<=6;y+=10)round(x,y,10,7,2,true)}if(p.type==='nofap'){ctx.strokeStyle='#ef4444';ctx.lineWidth=4;ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-15,15);ctx.lineTo(15,-15);ctx.stroke()}ctx.fillStyle='#fff';ctx.strokeStyle='#020617';ctx.lineWidth=4;ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.strokeText(p.name,0,38);ctx.fillText(p.name,0,38);ctx.restore()}
function drawProjectile(pr){ctx.save();ctx.translate(pr.x,pr.y);ctx.fillStyle='rgba(244,114,182,.95)';ctx.beginPath();ctx.ellipse(0,0,24,12,0,0,Math.PI*2);ctx.fill();ctx.restore()}function drawAttackFx(){const f=state.attackFx;if(!f)return;const a=1-(performance.now()-f.created)/f.ttl;if(a<=0){state.attackFx=null;return}ctx.globalAlpha=a;if(f.type==='poop'){ctx.fillStyle='#78350f';ctx.beginPath();ctx.arc(f.x,f.y,f.r*.55,0,Math.PI*2);ctx.fill()}else if(f.type==='shock'){ctx.strokeStyle='#fde047';ctx.lineWidth=5;for(let i=0;i<8;i++){const an=i*Math.PI/4;ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(f.x+Math.cos(an)*f.r,f.y+Math.sin(an)*f.r);ctx.stroke()}}else if(f.type==='freeze'){ctx.strokeStyle='#93c5fd';ctx.lineWidth=6;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.stroke()}else if(f.type==='pee'){ctx.strokeStyle='#facc15';ctx.lineWidth=12;ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(f.x+(state.player.dir||1)*f.r,f.y+5);ctx.stroke()}else{ctx.strokeStyle='#f9a8d4';ctx.lineWidth=6;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=1}
function hud(){const p=state.player;if(!p)return;els.lvl.textContent=`Level ${p.level||1}`;els.gold.textContent=`Gold ${p.gold||0}`;els.hp.style.width=`${clamp(p.hp/p.maxHp*100,0,100)}%`;els.xp.style.width=`${clamp(p.xp/p.nextXp*100,0,100)}%`;els.stage.style.width=`${(state.stage===3||state.stage===5)?25:clamp(state.stageKills/state.target*100,0,100)}%`;els.weapon.textContent=`Weapon: ${WEAPONS[state.weapon].name}`;els.msg.textContent=state.msg}
const keys={up:false,down:false,left:false,right:false};addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['w','arrowup'].includes(k))keys.up=true;if(['s','arrowdown'].includes(k))keys.down=true;if(['a','arrowleft'].includes(k))keys.left=true;if(['d','arrowright'].includes(k))keys.right=true;if(k===' ')attack(state.player);if(['1','2','3','4','5'].includes(k)){state.weapon=Number(k)-1;selectWeapon()}});addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(['w','arrowup'].includes(k))keys.up=false;if(['s','arrowdown'].includes(k))keys.down=false;if(['a','arrowleft'].includes(k))keys.left=false;if(['d','arrowright'].includes(k))keys.right=false});
function loop(t){const dt=Math.min(.03,((t-last)||16)/1000);last=t;update(dt,t);draw()}let last=performance.now();requestAnimationFrame(loop);
function connect(){if(net.ws||net.connecting)return;if(location.protocol==='file:'){els.multiStatus.textContent='Needs server';return}net.connecting=true;els.multiStatus.textContent='Connecting';const url=`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws`;net.ws=new WebSocket(url);net.ws.onopen=()=>{net.ready=true;net.connecting=false;els.multiStatus.textContent='Connected';sendPlayer(true)};net.ws.onclose=()=>{net.ready=false;net.connecting=false;net.ws=null;els.multiStatus.textContent='Offline'};net.ws.onerror=()=>{net.ready=false;net.connecting=false;els.multiStatus.textContent='Offline'};net.ws.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='players'){state.remotes={};Object.keys(m.players||{}).forEach(id=>{if(id!==net.id)state.remotes[id]=m.players[id]});const starter=Object.values(state.remotes).find(p=>p&&p.lobbyStarted);if(starter&&!state.playing&&!lobby.started)startLobbyGame();updateLobbyUI()}if(m.type==='world'&&m.id!==net.id&&!isHost()&&state.playing)applyWorld(m.world);if(m.type==='action'&&m.id!==net.id&&isHost())attack(m.action.origin,true,m.action.weapon,m.action.level);if(m.type==='leave')delete state.remotes[m.id]}catch{}}}
function sendPlayer(force=false){if(!net.ready||!net.ws||net.ws.readyState!==1)return;const t=performance.now();if(!force&&t-net.lastSend<90)return;net.lastSend=t;const p=state.player||{x:W/2,y:H/2,hp:100,maxHp:100,level:1,dir:1};net.ws.send(JSON.stringify({type:'update',id:net.id,player:{name:state.name,x:p.x,y:p.y,hp:p.hp,maxHp:p.maxHp,level:p.level,weapon:state.weapon,character:state.char,dir:p.dir,joinedAt:net.joinedAt,inLobby:lobby.in,ready:lobby.ready,host:isHost(),countdownStart:isHost()?lobby.countdownStart:null,lobbyStarted:lobby.started}}))}
function sendWorld(){if(!net.ready||!net.ws||net.ws.readyState!==1||!isHost())return;const t=performance.now();if(t-net.lastWorld<160)return;net.lastWorld=t;net.ws.send(JSON.stringify({type:'world',id:net.id,world:{stage:state.stage,cycle:state.cycle,stageKills:state.stageKills,target:state.target,enemies:state.enemies,projectiles:state.projectiles,powerups:state.powerups}}))}
function applyWorld(w){if(!w)return;state.stage=w.stage||state.stage;state.cycle=w.cycle||state.cycle;state.stageKills=w.stageKills||0;state.target=w.target||stageTarget(state.stage);state.enemies=(w.enemies||[]).map(e=>({...e}));state.projectiles=(w.projectiles||[]).map(p=>({...p}));state.powerups=(w.powerups||[]).map(p=>({...p}))}
function sendAttack(origin){if(!net.ready||!net.ws||net.ws.readyState!==1||isHost())return false;net.ws.send(JSON.stringify({type:'action',id:net.id,action:{origin,weapon:state.weapon,level:state.player?.level||1}}));state.attackFx={x:origin.x,y:origin.y,r:WEAPONS[state.weapon].range,type:WEAPONS[state.weapon].effect,ttl:180,created:performance.now()};return true}
function lobbyPlayers(){const list=[{id:net.id,name:state.name,ready:lobby.ready,host:isHost(),joinedAt:net.joinedAt,countdownStart:lobby.countdownStart,lobbyStarted:lobby.started}];Object.keys(state.remotes).forEach(id=>{const p=state.remotes[id];if(p.inLobby||p.countdownStart||p.lobbyStarted)list.push({id,name:p.name,ready:p.ready,host:p.host,joinedAt:p.joinedAt||Date.now(),countdownStart:p.countdownStart,lobbyStarted:p.lobbyStarted})});return list.sort((a,b)=>a.joinedAt-b.joinedAt||a.id.localeCompare(b.id))}
function allReady(){const l=lobbyPlayers();return l.length>=2&&l.every(p=>p.ready)}function updateLobbyUI(){const list=lobbyPlayers();els.lobbyPlayers.innerHTML=list.map(p=>`<div class="lobby-player ${p.ready?'ready':''}"><span>${safe(p.name)}${p.host?' 👑':''}</span><span class="ready-pill">${p.ready?'READY':'WAITING'}</span></div>`).join('');if(!net.ready){els.lobbyInfo.textContent='Connect first.';els.lobbyCountdown.textContent='';return}if(list.length<2){els.lobbyInfo.textContent='Waiting for more players...';els.lobbyCountdown.textContent='';return}const remoteHost=list.find(p=>p.host&&(p.countdownStart||p.lobbyStarted));if(remoteHost?.lobbyStarted&&!lobby.started){startLobbyGame();return}if(!allReady()){els.lobbyInfo.textContent='Waiting until all players click Ready.';els.lobbyCountdown.textContent='';lobby.countdownStart=null;return}if(isHost()){if(!lobby.countdownStart)lobby.countdownStart=Date.now();if(Date.now()-lobby.countdownStart>=10000){startLobbyGame();return}}else if(remoteHost?.countdownStart)lobby.countdownStart=remoteHost.countdownStart;const left=Math.max(0,10-Math.floor((Date.now()-(lobby.countdownStart||Date.now()))/1000));els.lobbyInfo.textContent='All players ready. Game starts in:';els.lobbyCountdown.textContent=String(left);sendPlayer(true)}function startLobbyGame(){lobby.started=true;lobby.in=false;lobby.ready=false;sendPlayer(true);startGame(state.char)}setInterval(()=>{if(lobby.in){sendPlayer();updateLobbyUI()}},250);
$('startBtn').onclick=()=>{state.name=safe($('playerNameInput').value)||'Player';show(els.chars)};$('backToMenuBtn').onclick=()=>show(els.menu);document.querySelectorAll('.char-card').forEach(b=>b.onclick=()=>startGame(b.dataset.char));$('menuBtn').onclick=()=>{state.playing=false;ui(false);show(els.menu);music()};$('soundBtn').onclick=$('soundBtnMenu').onclick=()=>{state.sound=!state.sound;$('soundBtn').textContent=`Sound ${state.sound?'On':'Off'}`;$('soundBtnMenu').textContent=`Sound: ${state.sound?'On':'Off'}`;state.sound?music():stopMusic()};$('multiBtnMenu').onclick=$('multiBtnTop').onclick=()=>{state.name=safe($('playerNameInput').value)||'Player';lobby.in=true;show(els.multi);updateLobbyUI()};$('connectBtn').onclick=()=>{lobby.in=true;connect()};$('readyBtn').onclick=()=>{lobby.ready=!lobby.ready;if(!lobby.ready)lobby.countdownStart=null;sendPlayer(true);updateLobbyUI()};$('closeMultiBtn').onclick=()=>{lobby.in=false;lobby.ready=false;show(state.playing?null:els.menu)};$('attackBtn').onclick=()=>state.player&&attack(state.player);document.querySelectorAll('.weapon').forEach(b=>b.onclick=()=>{state.weapon=Number(b.dataset.weapon);selectWeapon();hud()});function selectWeapon(){document.querySelectorAll('.weapon').forEach(b=>b.classList.toggle('selected',Number(b.dataset.weapon)===state.weapon))}document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key;const on=e=>{e.preventDefault();b.classList.add('active');keys[k]=true};const off=e=>{e.preventDefault();b.classList.remove('active');keys[k]=false};b.addEventListener('pointerdown',on);b.addEventListener('pointerup',off);b.addEventListener('pointercancel',off)});canvas.addEventListener('pointerdown',e=>{if(state.playing)attack(toGame(e))});addEventListener('pointerdown',()=>music());hud();
})();
</script>
