        this.streetText=this.add.text(448,248,'רחוב החסידה',{fontFamily:'Arial',fontSize:'24px',fontStyle:'bold',color:'#fde68a'}).setOrigin(.5).setDepth(-19);
        return;
      }
      const color=state.stage===2?0xd6b98c:state.stage===3?0x3b0764:state.stage===5?0x3f1d0b:0x245466;
      bg.fillStyle(color,1).fillRect(0,0,W,H); bg.lineStyle(1,0xffffff,.1); for(let x=0;x<W;x+=46){ bg.lineBetween(x,0,x,H); } for(let y=0;y<H;y+=46){ bg.lineBetween(0,y,W,y); } bg.fillStyle(0xffffff,.15); for(let i=0;i<16;i++) bg.fillEllipse(40+(i*73)%830,75+(i*57)%430,60,22);
    }
    startRun(reset=true){ state.gameStarted=true; state.gameWon=false; if(reset){ state.stage=1; state.cycle=1; state.stageKills=0; state.target=stageTarget(1); state.enemies.forEach(e=>e.destroy&&e.destroy()); state.enemies=[]; state.powerups.forEach(p=>{p.iconText?.destroy();p.destroy&&p.destroy();}); state.powerups=[]; state.projectiles.forEach(p=>p.destroy&&p.destroy()); state.projectiles=[]; state.nofapUntil=0; state.speedBoostUntil=0; this.createPlayer(); } this.drawBathroom(); showGameUI(true); show(null); playSoundtrack(); this.scene.resume(); }
    nextStage(){ if(state.stage===5){ this.win(); return; } state.stage++; state.stageKills=0; state.target=stageTarget(state.stage); state.enemies.forEach(e=>e.destroy&&e.destroy()); state.enemies=[]; state.powerups.forEach(p=>{p.iconText?.destroy();p.destroy&&p.destroy();}); state.powerups=[]; state.projectiles.forEach(p=>p.destroy&&p.destroy()); state.projectiles=[]; state.message=(state.stage===3||state.stage===5)?'Boss fight started.':'Next level started.'; this.drawBathroom(); this.spawnInitial(); }
    win(){ state.gameWon=true; state.gameStarted=false; showGameUI(false); this.scene.pause(); showVictory(); }
    spawnInitial(){ if(state.stage===3||state.stage===5){ this.spawnBoss(); } else { while(state.enemies.length<Math.min(12,state.target-state.stageKills)) this.spawnEnemy(); } }
    spawnEnemy(){ const pos=this.edgePos(); let t; if(state.stage===4)t=STAGE4_TYPE; else if(state.stage===2 && Math.random()<.42)t=Phaser.Utils.Array.GetRandom(STAGE2_TYPES); else t=Phaser.Utils.Array.GetRandom(ENEMY_TYPES); const scale=difficulty(); const e=this.makeHuman(pos.x,pos.y,t.color,true); e.boss=false; e.kind=t.name; e.hp=Math.floor(t.hp*scale); e.maxHp=e.hp; e.damage=Math.floor(t.damage*scale*.75); e.speed=t.speed+(state.cycle-1)*5; e.xp=Math.floor(t.hp*.9*scale); e.speech=(state.stage===4&&Math.random()<.2)?t.speech:(Math.random()<.25?t.speech:''); state.enemies.push(e); }
    spawnBoss(){ const is5=state.stage===5; const e=this.makeHuman(W/2,is5?190:170,is5?0x7c2d12:0xec4899,true); e.boss=true; e.kind=is5?'taxiboss':'boss'; e.hp=Math.floor((is5?1700:850)*difficulty()); e.maxHp=e.hp; e.damage=is5?28:18; e.speed=is5?280:34; e.xp=is5?1100:600; e.nextDash=this.time.now+900; e.speech=is5?'תאמין לי.. כשאתה נשוי זה כמו כוס על מגש':'כל המלשינים מהחסידה'; state.enemies.push(e); }
    edgePos(){ const s=Phaser.Math.Between(0,3); if(s===0)return{x:30,y:Phaser.Math.Between(70,H-70)}; if(s===1)return{x:W-30,y:Phaser.Math.Between(70,H-70)}; if(s===2)return{x:Phaser.Math.Between(70,W-70),y:50}; return{x:Phaser.Math.Between(70,W-70),y:H-45}; }
    attack(origin){ if(!state.gameStarted||state.gameWon)return; if(sendAttack(origin))return; this.applyAttack(origin,state.weapon,state.player.level,false); }
    applyAttack(origin,weaponIndex,level,remote=false){ const w=WEAPONS[weaponIndex]||WEAPONS[0]; const t=this.time.now; if(!remote&&t-state.lastAttack<w.cooldown)return; if(!remote)state.lastAttack=t; let killed=0,bossKilled=false,hit=false; this.fx.clear(); this.drawAttackFx(origin,w); state.enemies=state.enemies.filter(e=>{ if(Phaser.Math.Distance.Between(origin.x,origin.y,e.x,e.y)<=w.range){ hit=true; e.hp-=w.damage+level*3+(this.time.now<state.nofapUntil?130:0); if(w.effect==='freeze'){ e.frozenUntil=t+2000; e.color=0x60a5fa; } this.addParticle(e.x,e.y,w.effect==='freeze'?0x93c5fd:0xf9a8d4); } if(e.hp<=0){ killed++; if(e.boss)bossKilled=true; state.player.xp+=e.xp||20; e.destroy(); return false; } return true; }); if(hit)state.message=`${w.name} hit.`; if(killed){ if(state.stage===3||state.stage===5){ if(bossKilled)state.stageKills=state.target; } else state.stageKills+=killed; if(state.stageKills>=state.target)this.nextStage(); else this.spawnInitial(); } }
    drawAttackFx(o,w){ const g=this.fx; g.clear(); g.setDepth(20); if(w.effect==='poop'){ g.fillStyle(0x78350f,.45).fillCircle(o.x,o.y,w.range*.55); } else if(w.effect==='shock'){ g.lineStyle(5,0xfde047,.9); for(let i=0;i<8;i++){ const a=i*Math.PI/4; g.lineBetween(o.x,o.y,o.x+Math.cos(a)*w.range,o.y+Math.sin(a)*w.range); } } else if(w.effect==='freeze'){ g.lineStyle(6,0x93c5fd,.9).strokeCircle(o.x,o.y,w.range); } else if(w.effect==='pee'){ g.lineStyle(12,0xfacc15,.9).lineBetween(o.x,o.y,o.x+(state.player.dir||1)*w.range,o.y+5); } else { g.lineStyle(6,0xf9a8d4,.9).strokeCircle(o.x,o.y,w.range); } this.time.delayedCall(130,()=>g.clear()); }
    addParticle(x,y,color){ const p=this.add.circle(x,y,4,color,.9).setDepth(30); this.tweens.add({targets:p,x:x+Phaser.Math.Between(-40,40),y:y+Phaser.Math.Between(-40,25),alpha:0,duration:420,onComplete:()=>p.destroy()}); }
    update(_,delta){ const dt=delta/1000; if(!state.gameStarted)return; const p=state.player; let dx=0,dy=0; if(this.keys.W.isDown||this.keys.LEFT.isDown)dx--; if(this.keys.D.isDown||this.keys.RIGHT.isDown)dx++; if(this.keys.W.isDown||this.keys.UP.isDown)dy--; if(this.keys.S.isDown||this.keys.DOWN.isDown)dy++; if(dx||dy){ const l=Math.hypot(dx,dy); const sp=245+Math.min(p.level*6,45)+(this.time.now<state.speedBoostUntil?120:0); p.x=Phaser.Math.Clamp(p.x+dx/l*sp*dt,35,W-35); p.y=Phaser.Math.Clamp(p.y+dy/l*sp*dt,50,H-35); p.dir=dx<0?-1:dx>0?1:p.dir; p.walk+=dt*12; }
      if(this.keys.SPACE.isDown)this.attack({x:p.x,y:p.y});
      this.drawHuman(p,false);
      this.drawRemotePlayers();
      if(net.ready&&!isHost()){ this.clientEffects(dt); return; }
      if(state.enemies.length===0)this.spawnInitial();
      state.enemies.forEach(e=>{ const frozen=this.time.now<(e.frozenUntil||0); if(!frozen){ if(e.kind==='taxiboss'&&this.time.now>(e.nextDash||0)){ e.x=Phaser.Math.Between(90,W-90); e.y=Phaser.Math.Between(120,H-90); e.nextDash=this.time.now+Phaser.Math.Between(750,1250); this.addParticle(e.x,e.y,0xfacc15); } const d=Phaser.Math.Distance.Between(e.x,e.y,p.x,p.y)||1; if(d>35){ e.x+=(p.x-e.x)/d*e.speed*dt; e.y+=(p.y-e.y)/d*e.speed*dt; } e.walk=(e.walk||0)+dt*8; } this.drawHuman(e,true); if(Phaser.Math.Distance.Between(e.x,e.y,p.x,p.y)<38)p.hp=Phaser.Math.Clamp(p.hp-e.damage*dt*.5,0,p.maxHp); });
      this.spawnPowerup(); this.updatePowerups(); this.updateStage5Projectiles(dt);
      if(p.hp<=0){ state.message='ZAIN BATAHAT, YOU ARE DEAD'; state.gameStarted=false; }
      sendWorld(); updateHud();
    }
    clientEffects(dt){ this.drawHuman(state.player,false); this.drawRemotePlayers(); state.enemies.forEach(e=>this.drawHuman(e,true)); this.updatePowerups(); updateHud(); }
    drawRemotePlayers(){
      Object.keys(state.remotePlayers||{}).forEach(id=>{
        const rp=state.remotePlayers[id];
        if(!rp || rp.inLobby || !Number.isFinite(rp.x) || !Number.isFinite(rp.y)) return;
        let spr=state.remoteSprites[id];
        if(!spr){ spr=this.makeHuman(rp.x,rp.y,PLAYER_COLORS[rp.character]||0x38bdf8,false); spr.remoteName=this.add.text(rp.x,rp.y-58,'',{fontFamily:'Arial',fontSize:'12px',fontStyle:'bold',color:'#ffffff',stroke:'#020617',strokeThickness:4}).setOrigin(.5).setDepth(30); state.remoteSprites[id]=spr; }
        spr.x=rp.x; spr.y=rp.y; spr.color=PLAYER_COLORS[rp.character]||0x38bdf8; spr.walk=(spr.walk||0)+.18; spr.dir=rp.dir||1; this.drawHuman(spr,false); spr.remoteName.setText(safe(rp.name||'Player')); spr.remoteName.setPosition(rp.x,rp.y-58);
      });
      Object.keys(state.remoteSprites||{}).forEach(id=>{ if(!state.remotePlayers[id]){ state.remoteSprites[id].remoteName?.destroy(); state.remoteSprites[id].destroy(); delete state.remoteSprites[id]; } });
    }
    spawnPowerup(){
      if(state.powerups.length>=2 || this.time.now < state.nextPowerup) return;
      const item=Phaser.Utils.Array.GetRandom(POWERUPS);
      const c=this.add.container(Phaser.Math.Between(90,W-90),Phaser.Math.Between(100,H-90)).setDepth(7);
      const g=this.add.graphics(); c.add(g); c.kind=item.type; c.label=item.name; c.color=item.color; c.iconText=this.add.text(c.x,c.y+30,item.name,{fontFamily:'Arial',fontSize:'11px',fontStyle:'bold',color:'#ffffff',stroke:'#020617',strokeThickness:4}).setOrigin(.5).setDepth(8);
      this.drawPowerup(c); state.powerups.push(c); state.nextPowerup=this.time.now+Phaser.Math.Between(6500,11000);
    }
    drawPowerup(c){
      const g=c.list[0]; g.clear(); g.fillStyle(c.color,1); g.fillRoundedRect(-30,-24,60,48,12); g.lineStyle(3,0xffffff,.85); g.strokeRoundedRect(-30,-24,60,48,12);
      if(c.kind==='newspaper'){ g.fillStyle(0xffffff,1); g.fillRect(-20,-14,40,28); g.lineStyle(1,0x111827,1); for(let y=-8;y<12;y+=6)g.lineBetween(-15,y,15,y); }
      if(c.kind==='bavaria'){ g.fillStyle(0x3f1d0b,1); for(let x=-18;x<=10;x+=14)for(let y=-10;y<=6;y+=10)g.fillRoundedRect(x,y,10,7,2); }
      if(c.kind==='nofap'){ g.fillStyle(0xffffff,1); g.fillCircle(-6,-2,10); g.lineStyle(4,0xef4444,1); g.strokeCircle(0,0,22); g.lineBetween(-15,15,15,-15); }
    }
    updatePowerups(){
      if(!state.player)return;
      state.powerups=state.powerups.filter(c=>{
        if(Phaser.Math.Distance.Between(c.x,c.y,state.player.x,state.player.y)<42){
          if(c.kind==='newspaper'){ state.speedBoostUntil=this.time.now+5000; state.message="ז'ורנאל אישה speed boost"; }
          if(c.kind==='bavaria'){ state.player.hp=state.player.maxHp; state.message='Bavaria Chocolate restored HP'; }
          if(c.kind==='nofap'){ state.nofapUntil=this.time.now+12000; state.message='No-Fap Challenge: 12 seconds'; }
          c.iconText?.destroy(); c.destroy(); return false;
        }
        return true;
      });
    }
    updateStage5Projectiles(dt){ if(state.stage!==5)return; const boss=state.enemies.find(e=>e.boss); if(!boss)return; if(this.time.now>state.nextProjectile){ const d=Phaser.Math.Distance.Between(boss.x,boss.y,state.player.x,state.player.y)||1; const pr=this.add.ellipse(boss.x,boss.y,46,22,0xf472b6,.95).setDepth(8); pr.vx=(state.player.x-boss.x)/d*185; pr.vy=(state.player.y-boss.y)/d*185; pr.ttl=4; state.projectiles.push(pr); state.nextProjectile=this.time.now+Phaser.Math.Between(900,1400); } state.projectiles=state.projectiles.filter(pr=>{ pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.ttl-=dt; if(Phaser.Math.Distance.Between(pr.x,pr.y,state.player.x,state.player.y)<30){ state.player.hp-=22; pr.destroy(); return false; } if(pr.ttl<=0){ pr.destroy(); return false; } return true; }); }
    netTick(){ sendPlayer(); }
  }

  let scene;
  const phaser = new Phaser.Game({ type: Phaser.AUTO, parent:'gameRoot', width:W, height:H, backgroundColor:'#020617', scale:{ mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH }, scene:MainScene, fps:{ target:60, forceSetTimeOut:false } });
  phaser.events.once('ready',()=>{ scene=phaser.scene.keys.main; });

  function updateHud(){ const p=state.player;if(!p||!WEAPONS[state.weapon])return; els.lvl.textContent=`Level ${p.level||1}`; els.gold.textContent=`Gold ${p.gold||0}`; els.hp.style.width=`${Phaser.Math.Clamp((p.hp/p.maxHp)*100,0,100)}%`; els.xp.style.width=`${Phaser.Math.Clamp((p.xp/p.nextXp)*100,0,100)}%`; els.stage.style.width=`${state.stage===3||state.stage===5?25:Phaser.Math.Clamp((state.stageKills/state.target)*100,0,100)}%`; els.weapon.textContent=`Weapon: ${WEAPONS[state.weapon].name}`; els.msg.textContent=state.message; }
  function startCharacterSelect(){ state.playerName=safe(document.getElementById('playerNameInput').value)||'Player'; show(els.chars); }
  function startWithCharacter(ch){ state.character=ch; show(null); scene.startRun(true); updateHud(); }
  function showVictory(){ showGameUI(false); show(null); const v=document.createElement('div'); v.className='screen'; v.id='victoryScreen'; v.innerHTML=`<div class="panel-box"><h1 class="metal-logo"><span class="metal-main">GO LAASOT MISHI!</span></h1><p>WOULD YOU LIKE TO CONTINUE?</p><div class="actions"><button class="btn primary" id="yesAgain">YES</button></div></div>`; document.body.appendChild(v); document.getElementById('yesAgain').onclick=()=>{ v.remove(); state.cycle++; scene.startRun(true); }; }

  function connect(){ if(net.ws||net.connecting)return; if(location.protocol==='file:'){ els.multiStatus.textContent='Needs server'; return; } net.connecting=true; els.multiStatus.textContent='Connecting'; const url=`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws`; net.ws=new WebSocket(url); net.ws.onopen=()=>{ net.ready=true; net.connecting=false; els.multiStatus.textContent='Connected'; sendPlayer(true); }; net.ws.onclose=()=>{ net.ready=false; net.connecting=false; net.ws=null; els.multiStatus.textContent='Offline'; }; net.ws.onerror=()=>{ net.ready=false; net.connecting=false; els.multiStatus.textContent='Offline'; }; net.ws.onmessage=e=>{ try{ const msg=JSON.parse(e.data); if(msg.type==='players'){ state.remotePlayers={}; Object.keys(msg.players||{}).forEach(id=>{ if(id!==net.id)state.remotePlayers[id]=msg.players[id]; }); const starter=Object.values(state.remotePlayers).find(p=>p&&p.lobbyStarted); if(starter&&!state.gameStarted&&!lobby.started){ startLobbyGame(); } updateLobbyUI(); } if(msg.type==='world'&&msg.id!==net.id&&!isHost()&&state.gameStarted)applyWorld(msg.world); if(msg.type==='action'&&msg.id!==net.id&&isHost())scene.applyAttack(msg.action.origin,msg.action.weapon,msg.action.level,true); if(msg.type==='leave')delete state.remotePlayers[msg.id]; }catch{} } }
  function sendPlayer(force=false){ if(!net.ready||!net.ws||net.ws.readyState!==1)return; const now=performance.now(); if(!force&&now-net.lastSend<90)return; net.lastSend=now; const p=state.player||{x:W/2,y:H/2,hp:100,maxHp:100,level:1,dir:1}; net.ws.send(JSON.stringify({type:'update',id:net.id,player:{name:state.playerName,x:p.x,y:p.y,hp:p.hp,maxHp:p.maxHp,level:p.level,weapon:state.weapon,character:state.character,dir:p.dir,joinedAt:net.joinedAt,inLobby:lobby.inLobby,ready:lobby.ready,host:isHost(),countdownStart:isHost()?lobby.countdownStart:null,lobbyStarted:lobby.started}})); }
  function sendWorld(){ if(!net.ready||!net.ws||net.ws.readyState!==1||!isHost())return; const now=performance.now(); if(now-net.lastWorld<160)return; net.lastWorld=now; net.ws.send(JSON.stringify({type:'world',id:net.id,world:{stage:state.stage,cycle:state.cycle,stageKills:state.stageKills,target:state.target,enemies:state.enemies.map(e=>({x:e.x,y:e.y,hp:e.hp,maxHp:e.maxHp,boss:e.boss,kind:e.kind,color:e.color,speech:e.speech,damage:e.damage,speed:e.speed,xp:e.xp,walk:e.walk,frozenUntil:e.frozenUntil||0,nextDash:e.nextDash||0})),gameWon:state.gameWon}})); }
  function applyWorld(w){ if(!w)return; state.stage=w.stage||state.stage; state.cycle=w.cycle||state.cycle; state.stageKills=w.stageKills||0; state.target=w.target||stageTarget(state.stage); if(scene){ state.enemies.forEach(e=>e.destroy&&e.destroy()); state.enemies=(w.enemies||[]).map(d=>{ const e=scene.makeHuman(d.x,d.y,d.color||0xfb7185,!!d.boss); Object.assign(e,d); e.bodyG=e.bodyG||e.list?.[0]; return e; }); scene.drawBathroom(); } }
  function sendAttack(origin){ if(!net.ready||!net.ws||net.ws.readyState!==1||isHost())return false; net.ws.send(JSON.stringify({type:'action',id:net.id,action:{kind:'attack',origin,weapon:state.weapon,level:state.player?.level||1}})); return true; }
  function lobbyPlayers(){ const list=[{id:net.id,name:state.playerName||'Player',ready:lobby.ready,host:isHost(),joinedAt:net.joinedAt,countdownStart:lobby.countdownStart,lobbyStarted:lobby.started}]; Object.keys(state.remotePlayers).forEach(id=>{ const p=state.remotePlayers[id]; if(p.inLobby||p.countdownStart||p.lobbyStarted)list.push({id,name:p.name,ready:p.ready,host:p.host,joinedAt:p.joinedAt||Date.now(),countdownStart:p.countdownStart,lobbyStarted:p.lobbyStarted}); }); return list.sort((a,b)=>a.joinedAt-b.joinedAt||a.id.localeCompare(b.id)); }
  function allReady(){ const l=lobbyPlayers(); return l.length>=2&&l.every(p=>p.ready); }
  function updateLobbyUI(){ const list=lobbyPlayers(); els.lobbyPlayers.innerHTML=list.map(p=>`<div class="lobby-player ${p.ready?'ready':''}"><span>${safe(p.name)}${p.host?' 👑':''}</span><span class="ready-pill">${p.ready?'READY':'WAITING'}</span></div>`).join(''); if(!net.ready){ els.lobbyInfo.textContent='Connect first.'; els.lobbyCountdown.textContent=''; return; } if(list.length<2){ els.lobbyInfo.textContent='Waiting for more players...'; els.lobbyCountdown.textContent=''; return; } const remoteHost=list.find(p=>p.host&&(p.countdownStart||p.lobbyStarted)); if(remoteHost?.lobbyStarted&&!lobby.started){ startLobbyGame(); return; } if(!allReady()){ els.lobbyInfo.textContent='Waiting until all players click Ready.'; els.lobbyCountdown.textContent=''; lobby.countdownStart=null; return; } if(isHost()){ if(!lobby.countdownStart)lobby.countdownStart=Date.now(); if(Date.now()-lobby.countdownStart>=10000){ startLobbyGame(); return; } } else if(remoteHost?.countdownStart) lobby.countdownStart=remoteHost.countdownStart; const left=Math.max(0,10-Math.floor((Date.now()-(lobby.countdownStart||Date.now()))/1000)); els.lobbyInfo.textContent='All players ready. Game starts in:'; els.lobbyCountdown.textContent=String(left); sendPlayer(true); }
  function startLobbyGame(){ lobby.started=true; lobby.inLobby=false; lobby.ready=false; sendPlayer(true); show(null); scene.startRun(true); }
  setInterval(()=>{ if(lobby.inLobby){ sendPlayer(); updateLobbyUI(); } },250);

  document.getElementById('startBtn').onclick=startCharacterSelect;
  document.getElementById('backToMenuBtn').onclick=()=>show(els.menu);
  document.querySelectorAll('.char-card').forEach(b=>b.onclick=()=>startWithCharacter(b.dataset.char));
  document.getElementById('menuBtn').onclick=()=>{ state.gameStarted=false; showGameUI(false); scene.scene.pause(); show(els.menu); playSoundtrack(); };
  document.getElementById('soundBtn').onclick=document.getElementById('soundBtnMenu').onclick=()=>{ state.soundOn=!state.soundOn; document.getElementById('soundBtn').textContent=`Sound ${state.soundOn?'On':'Off'}`; document.getElementById('soundBtnMenu').textContent=`Sound: ${state.soundOn?'On':'Off'}`; state.soundOn?playSoundtrack():stopSoundtrack(); };
  document.getElementById('multiBtnMenu').onclick=document.getElementById('multiBtnTop').onclick=()=>{ state.playerName=safe(document.getElementById('playerNameInput').value)||'Player'; lobby.inLobby=true; show(els.multi); updateLobbyUI(); };
  document.getElementById('connectBtn').onclick=()=>{ lobby.inLobby=true; connect(); };
  document.getElementById('readyBtn').onclick=()=>{ lobby.ready=!lobby.ready; if(!lobby.ready)lobby.countdownStart=null; sendPlayer(true); updateLobbyUI(); };
  document.getElementById('closeMultiBtn').onclick=()=>{ lobby.inLobby=false; lobby.ready=false; show(state.gameStarted?null:els.menu); };
  document.getElementById('attackBtn').onclick=()=>{ if(scene&&state.player)scene.attack({x:state.player.x,y:state.player.y}); };
  document.querySelectorAll('.weapon').forEach(b=>b.onclick=()=>{ state.weapon=Number(b.dataset.weapon); document.querySelectorAll('.weapon').forEach(x=>x.classList.toggle('selected',x===b)); updateHud(); });
  document.querySelectorAll('[data-key]').forEach(b=>{ const k=b.dataset.key; const on=e=>{e.preventDefault(); if(!scene||!scene.keys)return; b.classList.add('active'); if(k==='up')scene.keys.UP.isDown=true; if(k==='down')scene.keys.DOWN.isDown=true; if(k==='left')scene.keys.LEFT.isDown=true; if(k==='right')scene.keys.RIGHT.isDown=true;}; const off=e=>{e.preventDefault(); if(!scene||!scene.keys)return; b.classList.remove('active'); if(k==='up')scene.keys.UP.isDown=false; if(k==='down')scene.keys.DOWN.isDown=false; if(k==='left')scene.keys.LEFT.isDown=false; if(k==='right')scene.keys.RIGHT.isDown=false;}; b.addEventListener('pointerdown',on); b.addEventListener('pointerup',off); b.addEventListener('pointercancel',off); });
  window.addEventListener('pointerdown',()=>playSoundtrack());
})();
